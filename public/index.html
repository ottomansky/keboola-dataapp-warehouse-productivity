<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Warehouse Productivity</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  </head>
  <body class="bg-white text-slate-900 font-sans">
    <main class="max-w-6xl mx-auto p-8">
      <h1 class="text-3xl font-semibold mb-1">Warehouse Productivity</h1>
      <p class="text-sm text-slate-500 mb-6">Pick activity from <code>out.c-warehouse_productivity_scoring.productivity_pick</code></p>

      <section class="grid grid-cols-4 gap-4 mb-8">
        <div class="p-4 rounded border border-slate-200">
          <div class="text-sm text-slate-500">Total picks</div>
          <div class="text-2xl font-semibold" id="kpi-picks">—</div>
        </div>
        <div class="p-4 rounded border border-slate-200">
          <div class="text-sm text-slate-500">Total orders</div>
          <div class="text-2xl font-semibold" id="kpi-orders">—</div>
        </div>
        <div class="p-4 rounded border border-slate-200">
          <div class="text-sm text-slate-500">Active pickers</div>
          <div class="text-2xl font-semibold" id="kpi-pickers">—</div>
        </div>
        <div class="p-4 rounded border border-slate-200">
          <div class="text-sm text-slate-500">Days of data</div>
          <div class="text-2xl font-semibold" id="kpi-days">—</div>
        </div>
      </section>

      <section class="mb-8">
        <h2 class="text-lg font-medium mb-3">Picks per day (last 30 days in dataset)</h2>
        <canvas id="chart-daily" height="100"></canvas>
      </section>

      <section>
        <h2 class="text-lg font-medium mb-3">Top 10 pickers by volume</h2>
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="text-left border-b border-slate-200 text-slate-500">
              <th class="py-2">Picker</th>
              <th class="py-2 text-right">Picks</th>
              <th class="py-2 text-right">Orders</th>
            </tr>
          </thead>
          <tbody id="picker-rows"></tbody>
        </table>
      </section>
    </main>
    <footer class="max-w-6xl mx-auto px-8 py-6 flex items-center justify-center gap-2 text-xs text-slate-400 opacity-80 hover:opacity-100 transition-opacity">
      <span>Powered by</span>
      <img src="/keboola-logo.svg" alt="Keboola" class="h-4 w-auto" />
    </footer>
    <script type="module" src="/app.js"></script>
  </body>
</html>
